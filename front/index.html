<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Algoritmos</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="addArquivos">
        <input id="fileInput" type="file" multiple />
        <button id="uploadButton">Adicionar arquivo(s)</button>
        <p id="uploadStatus"></p>
    </div>

    <div class="search">
        <select id="selectAlg">
            <option value="naive">Naive</option>
            <option value="kmp">KMP</option>
            <option value="rabin">Rabin-Karp</option>
            <option value="boyer">Boyer-Moore</option>
        </select>

        <input id="searchInput" type="text" placeholder="Buscar...">

        <button id="searchButton">Executar</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const uploadStatus = document.getElementById('uploadStatus');
        const searchButton = document.getElementById('searchButton');
        const searchInput = document.getElementById('searchInput');
        const selectAlg = document.getElementById('selectAlg');

        let storedFiles = [];

        // UPLOAD (só guarda no front)
        uploadButton.addEventListener('click', () => {
            const files = fileInput.files;

            if (!files.length) {
                uploadStatus.textContent = 'Selecione arquivos';
                return;
            }

            storedFiles = Array.from(files);

            uploadStatus.textContent = `${storedFiles.length} arquivo(s) carregado(s)`;
        });

        // SEARCH
        searchButton.addEventListener('click', async () => {
            const pattern = searchInput.value;
            const algorithm = selectAlg.value;

            if (!pattern) {
                uploadStatus.textContent = 'Digite algo para buscar';
                return;
            }

            const formData = new FormData(); // ✅ CRIA AQUI PRIMEIRO
            formData.append('pattern', pattern);
            formData.append('algorithm', algorithm);

            // se tiver arquivos carregados, envia
            if (storedFiles.length > 0) {
                for (const file of storedFiles) {
                    formData.append('files', file);
                }
            }

            uploadStatus.textContent = 'Buscando...';

            try {
                const response = await fetch('http://localhost:3000/search', {
                    method: 'POST',
                    body: formData
                });

                // 👇 evita erro quando vem HTML (tipo "Cannot POST")
                const text = await response.text();

                try {
                    const data = JSON.parse(text);
                    uploadStatus.textContent = JSON.stringify(data, null, 2);
                } catch {
                    uploadStatus.textContent = text; // mostra erro real do servidor
                }

            } catch (error) {
                console.error(error);
                uploadStatus.textContent = 'Erro na busca';
            }
        });
    </script>

</body>
</html>
