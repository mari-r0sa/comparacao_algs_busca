<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Algoritmos</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="addArquivos">
        <input id="fileInput" type="file" multiple />
        <button type="button" id="uploadButton">Adicionar arquivo(s)</button>
        <p id="uploadStatus"></p>
    </div>

    <div class="search">
        <select id="selectAlg">
            <option value="naive">Naive</option>
            <option value="kmp">KMP</option>
            <option value="rabin">Rabin-Karp</option>
            <option value="boyer">Boyer-Moore</option>
        </select>

        <input id="searchInput" type="text" placeholder="Buscar...">

        <button type="button" id="searchButton">Executar</button>
        <button type="button" id="stepButton">Passo a passo</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const uploadStatus = document.getElementById('uploadStatus');
        const searchButton = document.getElementById('searchButton');
        const searchInput = document.getElementById('searchInput');
        const selectAlg = document.getElementById('selectAlg');
        const stepButton = document.getElementById('stepButton');
        
        let storedFiles = [];

        // UPLOAD
        uploadButton.addEventListener('click', (event) => {
            event.preventDefault();

            const files = fileInput.files;

            if (!files.length) {
                uploadStatus.textContent = 'Selecione arquivos';
                return;
            }

            storedFiles = Array.from(files);

            uploadStatus.textContent = `${storedFiles.length} arquivo(s) carregado(s)`;
        });

        // SEARCH
        searchButton.addEventListener('click', (event) => {
            event.preventDefault();
            executarBusca(false);
        });

        stepButton.addEventListener('click', (event) => {
            event.preventDefault();
            executarBusca(true);
        });

        async function executarBusca(stepByStep) {
            const pattern = searchInput.value;
            const algorithm = selectAlg.value;

            if (!pattern) {
                uploadStatus.textContent = 'Digite algo para buscar';
                return;
            }

            const formData = new FormData();
            formData.append('pattern', pattern);
            formData.append('algorithm', algorithm);
            formData.append('stepByStep', stepByStep);

            if (storedFiles.length > 0) {
                for (const file of storedFiles) {
                    formData.append('files', file);
                }
            }

            uploadStatus.textContent = stepByStep ? 'Executando passo a passo...' : 'Executando...';

            try {
                const response = await fetch('http://localhost:3000/search', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                let output = "Log de execução\n\n";

                if (!data.resultados) {
                    uploadStatus.innerText = JSON.stringify(data, null, 2);
                    return;
                }

                data.resultados.forEach(r => {
                    output += `\n- Arquivo: ${r.arquivo}\n`;
                    output += `Ocorrências: ${r.ocorrencias}\n`;
                    output += `Posições: ${r.posicoes.length ? r.posicoes.join(", ") : "Nenhuma ocorrência encontrada"}\n`;
                    output += `Comparações: ${r.metrics.comparisons}\n`;

                    output += `\n- Métricas:\n`;
                    output += `Tempo: ${r.metrics.executionTime} ms\n`;
                    output += `Texto: ${r.metrics.textLength}\n`;
                    output += `Padrão: ${r.metrics.patternLength}\n`;
                    output += `Complexidade: ${r.metrics.complexity}\n`;

                    if (stepByStep && r.steps) {
                        output += `\n- Passo a passo:\n`;
                        output += r.steps.join("\n");
                    }

                    output += `\n\n============================================\n`;
                });

                uploadStatus.innerText = output;

            } catch (error) {
                console.error(error);
                uploadStatus.textContent = 'Erro na busca';
            }
        }
    </script>

</body>
</html>
